name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build (unsigned)
        shell: pwsh
        run: .\build.ps1 -NoSign

      - name: Capture build version
        id: version
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path release -Filter 'Cimian-*-x64.msi' | Select-Object -First 1
          if (-not $msi) { throw 'No x64 MSI produced by build.ps1' }
          if ($msi.Name -match '^Cimian-(\d{4}\.\d{2}\.\d{2}\.\d{4})-x64\.msi$') {
            $datestamp = $Matches[1]
          } else {
            throw "Could not parse datestamp version from $($msi.Name)"
          }
          "datestamp=$datestamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Build datestamp version: $datestamp"

      - name: List release artifacts
        shell: pwsh
        run: Get-ChildItem -Path release -Recurse -Include '*.msi','*.nupkg','*.pkg','*.intunewin' | Select-Object FullName, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}}

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.ref_name }}'
          $datestamp = '${{ steps.version.outputs.datestamp }}'
          $title = "Cimian $tag — build $datestamp"
          $notes = @"
          **Tag:** ``$tag``
          **Build:** ``$datestamp``

          Built unsigned from commit ``$env:GITHUB_SHA`` on ``$env:GITHUB_REF_NAME``.

          See the auto-generated changelog below for what's new.
          "@
          $artifacts = Get-ChildItem -Path release -Recurse -Include '*.msi','*.nupkg','*.pkg','*.intunewin' | ForEach-Object { $_.FullName }
          if ($artifacts.Count -eq 0) { throw 'No artifacts to upload' }
          gh release create $tag @artifacts --title $title --notes $notes --generate-notes
