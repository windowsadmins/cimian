name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: 'America/Vancouver'

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      # No NuGet caching — see ci.yml for rationale.
      - name: Build (unsigned)
        shell: pwsh
        run: .\build.ps1 -NoSign

      - name: Capture build info
        id: version
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path release -Filter 'Cimian-*-x64.msi' | Select-Object -First 1
          if (-not $msi) { throw 'No x64 MSI produced by build.ps1' }
          if ($msi.Name -match '^Cimian-(\d{4}\.\d{2}\.\d{2}\.\d{4})-x64\.msi$') {
            $datestamp = $Matches[1]
          } else {
            throw "Could not parse datestamp version from $($msi.Name)"
          }
          $dotnetVersion = (dotnet --version).Trim()
          $osCaption = (Get-CimInstance Win32_OperatingSystem).Caption.Trim()
          $cimipkgVersion = (& git -C cli/cimipkg describe --tags --always 2>$null).Trim()
          if (-not $cimipkgVersion) { $cimipkgVersion = 'unknown' }
          "datestamp=$datestamp"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "dotnet=$dotnetVersion"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "os=$osCaption"                  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "cimipkg=$cimipkgVersion"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "datestamp: $datestamp"
          Write-Host "dotnet:    $dotnetVersion"
          Write-Host "os:        $osCaption"
          Write-Host "cimipkg:   $cimipkgVersion"

      - name: Package raw binaries as Cimian-<datestamp>-<arch>.zip
        shell: pwsh
        run: |
          # Ship a plain .zip per architecture alongside the .msi/.nupkg so
          # downstream automation (e.g. cimian-bootstrap-mgmt's repo-sync
          # step) can grab cimiimport.exe + makecatalogs.exe without
          # decompiling an MSI or treating a NuGet package as a zip.
          $datestamp = '${{ steps.version.outputs.datestamp }}'
          foreach ($arch in 'x64','arm64') {
              $binDir = Join-Path 'release' $arch
              if (-not (Test-Path $binDir)) {
                  Write-Host "::warning::release/$arch missing -- skipping zip"
                  continue
              }
              $zipPath = "release/Cimian-$datestamp-$arch.zip"
              if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
              Compress-Archive -Path (Join-Path $binDir '*') -DestinationPath $zipPath -CompressionLevel Optimal
              $sizeMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
              Write-Host "  $zipPath ($sizeMB MB)"
          }

      - name: List release artifacts
        shell: pwsh
        run: |
          # Sort x64 ahead of arm64 so the release page lists architectures in that order.
          Get-ChildItem -Path release -Recurse -Include '*.msi','*.nupkg','*.pkg','*.intunewin','*.zip' |
              Sort-Object @{Expression={ if ($_.Name -match '(?i)x64') { 0 } elseif ($_.Name -match '(?i)arm64') { 1 } else { 2 } }}, Name |
              Select-Object FullName, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}}

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.ref_name }}'
          $datestamp = '${{ steps.version.outputs.datestamp }}'
          $dotnet = '${{ steps.version.outputs.dotnet }}'
          $os = '${{ steps.version.outputs.os }}'
          $cimipkg = '${{ steps.version.outputs.cimipkg }}'
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $title = "Cimian $tag"

          $buildInfo = @"
          ## Build info

          This release was built with .NET SDK $dotnet on $os, using cimian-pkg $cimipkg, via a GitHub Actions workflow here: $runUrl. It is provided **unsigned** — see signing instructions at the bottom.
          "@

          $signing = @"
          ## Signing for enterprise deployment

          Sign the binaries and MSIs with your organization's code signing certificate before distribution:

          ``````powershell
          `$cert = "Your Certificate Name"
          `$timestampUrl = "http://timestamp.digicert.com"

          # Sign all binaries (run after extracting the MSI/nupkg payload)
          Get-ChildItem -Recurse -Include *.exe,*.dll | ForEach-Object {
              signtool sign /fd SHA256 /tr `$timestampUrl /td SHA256 /n `$cert `$_.FullName
          }

          # Sign the MSI installers (run separately, after binaries are signed and repackaged)
          Get-ChildItem -Filter "Cimian-*.msi" | ForEach-Object {
              signtool sign /fd SHA256 /tr `$timestampUrl /td SHA256 /n `$cert `$_.FullName
          }
          ``````

          Built from commit ``$env:GITHUB_SHA``.
          "@

          $autoNotes = (gh api -X POST "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" -f tag_name=$tag --jq .body) -join "`n"
          $autoNotes = ($autoNotes -join "`n") -replace ' by @[\w-]+ in ', ' in '
          $autoNotes = ($autoNotes -split "`n" | Where-Object { $_ -notmatch '^#+ New Contributors' -and $_ -notmatch 'made their first contribution' }) -join "`n"
          $notes = "$buildInfo`n`n$autoNotes`n`n$signing"

          # Upload x64 assets before arm64 so the release page lists them in that order.
          $artifacts = Get-ChildItem -Path release -Recurse -Include '*.msi','*.nupkg','*.pkg','*.intunewin','*.zip' |
              Sort-Object @{Expression={ if ($_.Name -match '(?i)x64') { 0 } elseif ($_.Name -match '(?i)arm64') { 1 } else { 2 } }}, Name |
              ForEach-Object { $_.FullName }
          if ($artifacts.Count -eq 0) { throw 'No artifacts to upload' }
          gh release create $tag @artifacts --title $title --notes $notes
