name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: 'America/Vancouver'

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      # No NuGet caching: actions/cache@v4 throws on Node 24 runners (DEP0169
      # url.parse) and setup-dotnet's built-in cache crashes on its tar/zstd
      # post-step write on Windows. Cold restore adds ~60s and is reliable.
      - name: Restore
        shell: pwsh
        run: dotnet restore CimianTools.sln

      - name: Build
        shell: pwsh
        run: dotnet build CimianTools.sln --configuration Release --no-restore --verbosity minimal

      - name: Test
        shell: pwsh
        run: dotnet test tests/Cimian.Tests/Cimian.Tests.csproj --configuration Release --runtime win-x64 --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: ignore
